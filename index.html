<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ώθ│ύυοίΙΗίΠξίνπί╕τ - 10ώκΝόΝΣόΙ░ύΚΙ</title>
    <style>
        :root {
            --sky-blue: #f0faff;
            --bar-line: #333;
            --rainbow: linear-gradient(to right, #ff4081, #ffeb3b, #4caf50, #00bcd4, #9c27b0);
        }

        body {
            margin: 0;
            background-color: var(--sky-blue);
            font-family: 'Segoe UI Symbol', 'Apple Symbols', 'Noto Music', 'PingFang HK', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ώΨΜίπΜώΒΛόΙ▓ώΒχύ╜σ */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--sky-blue);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #progress-bar {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #0277bd;
            font-weight: bold;
        }

        #task-info {
            background: white;
            padding: 20px 40px;
            margin: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border: 3px solid #b3e5fc;
            width: 80%;
            max-width: 600px;
        }

        .task-msg { font-size: 1.4rem; color: #0277bd; }
        .highlight { color: #e91e63; font-size: 2rem; font-weight: bold; }

        #music-line {
            display: flex;
            align-items: center;
            width: 95vw;
            max-width: 1000px;
            margin-top: 80px;
            padding: 20px 0;
            position: relative;
        }

        .measure {
            flex: 1;
            height: 120px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--bar-line);
            cursor: pointer;
            transition: background 0.2s;
        }

        .measure:hover { background: rgba(255,255,255,0.4); }
        .measure:first-child { border-left: 2px solid var(--bar-line); }
        .measure:last-child { border-right: 6px double var(--bar-line); }

        .notes {
            font-size: 55px; 
            letter-spacing: 8px;
            color: #222;
            line-height: 1;
        }

        /* όεΑίΙζϋοΒό▒ΓύγΕόρμί╝ΠΎ╝γn ίφΩίηΜί╜σϋβ╣ώΓΛόκΗ */
        .phrase-arc {
            position: absolute;
            top: -65px;
            height: 75px;
            border: 5px solid;
            border-image: var(--rainbow) 1;
            border-bottom: none;
            border-radius: 120px 120px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        .breath-bird {
            position: absolute;
            right: -15px;
            top: -45px;
            font-size: 30px;
            z-index: 15;
        }

        #control-panel { margin-top: 60px; text-align: center; padding-bottom: 50px; }
        .btn {
            padding: 12px 40px;
            font-size: 1.6rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        
        #next-btn { background: #8bc34a; color: white; display: none; box-shadow: 0 5px 0 #689f38; }
        #restart-btn { background: #03a9f4; color: white; display: none; box-shadow: 0 5px 0 #0288d1; }
        
        #feedback { margin-top: 20px; font-size: 1.5rem; font-weight: bold; min-height: 1.5em; }

        .congrats {
            font-size: 2.5rem !important;
            color: #ff4081 !important;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="startOverlay">
    <h1 style="font-size: 3.5rem; color: #ff4081; margin-bottom: 20px;">ώθ│ύυοίΙΗίΠξίνπί╕τ ΏθΟ╡</h1>
    <p style="font-size: 1.5rem; color: #555; margin-bottom: 40px;">όΝΣόΙ░ 10 ώκΝ έβσ ϋΙΘ έβτ ύγΕίΙΗίΠξύ╖┤ύ┐ΤΎ╝Β</p>
    <button class="btn" style="background: #ffca28; color: #5d4037; font-size: 2rem;" onclick="startGame()">ώΨΜίπΜώΒΛόΙ▓ ΏθΟχ</button>
</div>

<div id="progress-bar">ώΑ▓ί║οΎ╝γύυυ <span id="current-q">1</span> / 10 ώκΝ</div>

<div id="task-info">
    <div class="task-msg">
        ώΑβόαψϊ╕ΑώοΨ <span id="beat-display" class="highlight">?</span> όΜΞίφΡύγΕόδ▓ίφΡ<br>
        ϋτΜόψΠ <span id="rule-display" class="highlight">?</span> ί░ΠύψΑίΒγϊ╕Αόυκόρβϋρα ΏθΝΙ
    </div>
</div>

<div id="music-line"></div>

<div id="control-panel">
    <div id="feedback"></div>
    <button id="next-btn" class="btn" onclick="nextQuestion()">ϊ╕Μϊ╕ΑώκΝ</button>
    <button id="restart-btn" class="btn" onclick="resetGame()">ώΘΞόΨ░όΝΣόΙ░</button>
</div>

<script>
    /* ώθ│ύυού╖ρύλ╝Ύ╝γ
       έβσ = ίδδίΙΗώθ│ύυο (1όΜΞ)
       έβτ = ίΖτίΙΗώθ│ύυοί░Ξ (0.5 + 0.5 = 1όΜΞ)
       ί╖▓ίΙςώβνόΚΑόεΚ ΏζΖΩΏζΖξ (ϊ║ΝίΙΗώθ│ύυο) ύ╡ΕίΡΙ
    */
    const PATTERNS_2 = ['έβσέβσ', 'έβτέβσ', 'έβσέβτ', 'έβτέβτ'];
    const PATTERNS_3 = ['έβσέβσέβσ', 'έβτέβσέβσ', 'έβσέβτέβσ', 'έβσέβσέβτ', 'έβτέβτέβσ', 'έβτέβτέβτ'];

    let currentBeat = 3;
    let currentRule = 2;
    let selectedPositions = new Set();
    let questionCount = 1;
    let isLocked = false;
    const totalQuestions = 10;

    function startGame() {
        document.getElementById('startOverlay').style.display = 'none';
        setupQuestion();
    }

    function setupQuestion() {
        const line = document.getElementById('music-line');
        line.innerHTML = '';
        selectedPositions.clear();
        isLocked = false;
        
        document.getElementById('feedback').innerText = '';
        document.getElementById('feedback').classList.remove('congrats');
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('current-q').innerText = questionCount;

        // ώγρόσθό▒║ίχγόευώκΝόαψ 2 όΜΞώΓΕόαψ 3 όΜΞ
        currentBeat = Math.random() > 0.5 ? 2 : 3;
        currentRule = Math.random() > 0.5 ? 2 : 4;

        document.getElementById('beat-display').innerText = currentBeat;
        document.getElementById('rule-display').innerText = currentRule;

        const currentBank = currentBeat === 2 ? PATTERNS_2 : PATTERNS_3;

        for (let i = 1; i <= 8; i++) {
            const m = document.createElement('div');
            m.className = 'measure';
            const notesText = currentBank[Math.floor(Math.random() * currentBank.length)];
            m.innerHTML = `<span class="notes">${notesText}</span>`;
            m.onclick = () => handleMeasureClick(i, m);
            line.appendChild(m);
        }
    }

    function handleMeasureClick(index, element) {
        if (isLocked) return;

        if (selectedPositions.has(index)) {
            selectedPositions.delete(index);
            element.querySelector('.phrase-arc')?.remove();
            element.querySelector('.breath-bird')?.remove();
        } else {
            selectedPositions.add(index);
            const arc = document.createElement('div');
            arc.className = 'phrase-arc';
            arc.style.width = `calc(${currentRule * 100}% + 4px)`;
            arc.style.right = '-2px'; 
            element.appendChild(arc);

            const bird = document.createElement('div');
            bird.className = 'breath-bird';
            bird.innerText = 'ΏθΡο';
            element.appendChild(bird);
        }
        checkAnswer();
    }

    function checkAnswer() {
        let answers = [];
        for (let j = currentRule; j <= 8; j += currentRule) answers.push(j);

        const win = selectedPositions.size === answers.length && 
                    answers.every(a => selectedPositions.has(a));

        if (win) {
            isLocked = true;
            const fb = document.getElementById('feedback');
            if (questionCount >= totalQuestions) {
                fb.innerText = "ΏθΟΛ ίνςόμΤϊ║ΗΎ╝Βϊ╜ιώιΗίΙσίχΝόΙΡϊ║Η 10 ώκΝύψΑίξΠόΝΣόΙ░Ύ╝Β ΏθΟΛ";
                fb.classList.add('congrats');
                fb.style.color = "#ff4081";
                document.getElementById('restart-btn').style.display = 'inline-block';
            } else {
                fb.innerText = "ΏθΝθ ϊ╜Ξύ╜χίχΝίΖρόφμύλ║Ύ╝Βϊ╜ιίξ╜όμΤΎ╝Β";
                fb.style.color = "#2e7d32";
                document.getElementById('next-btn').style.display = 'inline-block';
            }
        }
    }

    function nextQuestion() {
        questionCount++;
        setupQuestion();
    }

    function resetGame() {
        questionCount = 1;
        document.getElementById('restart-btn').style.display = 'none';
        setupQuestion();
    }
</script>
</body>
</html>
