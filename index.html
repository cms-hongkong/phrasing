<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符剪刀手 - 學習分句</title>
    <style>
        body {
            margin: 0;
            background: #fff9c4;
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #ui { text-align: center; margin: 20px; }
        h1 { color: #f57c00; }
        .hint { color: #666; font-size: 1.1rem; }

        /* 五線譜區域 */
        #staff {
            width: 100vw;
            height: 250px;
            background: white;
            border-top: 4px solid #333;
            border-bottom: 4px solid #333;
            position: relative;
            margin-top: 50px;
            /* 繪製五線譜的線 */
            background-image: linear-gradient(#eee 1px, transparent 1px);
            background-size: 100% 20px;
        }

        /* 判定區域（剪刀位置） */
        #cut-zone {
            position: absolute;
            left: 150px;
            top: 0;
            width: 80px;
            height: 100%;
            border: 4px dashed #ff5252;
            background: rgba(255, 82, 82, 0.1);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
        }

        /* 音符樣式 */
        .note {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px; /* 使用 Emoji 或符號 */
            transition: transform 0.1s;
        }

        /* 按鈕 */
        #btn-cut {
            margin-top: 40px;
            padding: 20px 80px;
            font-size: 2rem;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #d32f2f;
            cursor: pointer;
        }

        #btn-cut:active { transform: translateY(4px); box-shadow: 0 4px 0 #d32f2f; }

        .balloon {
            position: absolute;
            font-size: 40px;
            animation: floatUp 1.5s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>🎵 音符剪刀手 🎵</h1>
    <p class="hint">當<b>空心音符 (長音)</b> 或 <b>休止符</b> 進入紅色框框時，快按下剪刀！</p>
</div>

<div id="staff">
    <div id="cut-zone">✂️</div>
    <div id="note-stream"></div>
</div>

<button id="btn-cut">✂️ 剪斷分句！</button>

<script>
    const stream = document.getElementById('note-stream');
    const cutZone = document.getElementById('cut-zone');
    
    // 定義音符類型
    const TYPE = {
        SHORT: '♩',  // 四分音符 (實心)
        LONG: '🚀',   // 我們可以用火箭或空心圓代表長音 𝅗𝅥
        REST: '💤'   // 休止符 𝄽
    };

    // 模擬一段旋律的音符序列
    const melody = [
        TYPE.SHORT, TYPE.SHORT, TYPE.SHORT, TYPE.LONG, // 第一句結束
        TYPE.SHORT, TYPE.SHORT, TYPE.SHORT, TYPE.LONG, // 第二句結束
        TYPE.SHORT, TYPE.SHORT, TYPE.SHORT, TYPE.REST  // 第三句結束
    ];

    let posX = window.innerWidth;
    let notesData = [];

    // 初始化音符
    function initNotes() {
        let spacing = 100;
        melody.forEach((type, i) => {
            const n = document.createElement('div');
            n.className = 'note';
            
            // 視覺區分：二年級學生對形狀很敏感
            if (type === TYPE.LONG) {
                n.innerHTML = '⚪'; // 空心代表長音
                n.style.color = '#2196F3';
            } else if (type === TYPE.REST) {
                n.innerHTML = '⚡'; // 閃電代表休止符
                n.style.color = '#9c27b0';
            } else {
                n.innerHTML = '⚫'; // 實心代表短音
                n.style.color = '#333';
            }

            n.style.left = (i * spacing) + 'px';
            n.style.top = '100px';
            stream.appendChild(n);
            notesData.push({ el: n, x: i * spacing, type: type });
        });
    }

    function animate() {
        posX -= 2.5; // 移動速度
        stream.style.transform = `translateX(${posX}px)`;

        if (posX < -1500) posX = window.innerWidth;
        requestAnimationFrame(animate);
    }

    document.getElementById('btn-cut').addEventListener('click', () => {
        let hit = false;
        
        notesData.forEach(n => {
            const currentX = posX + n.x;
            const dist = Math.abs(currentX - 150); // 150 是剪刀位置

            if (dist < 40 && (n.type === TYPE.LONG || n.type === TYPE.REST)) {
                hit = true;
                createBalloon(currentX);
            }
        });

        if (hit) {
            console.log("分句成功！");
        }
    });

    function createBalloon(x) {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.innerText = '🎈';
        b.style.left = '150px';
        b.style.top = '100px';
        document.getElementById('staff').appendChild(b);
        setTimeout(() => b.remove(), 1500);
    }

    initNotes();
    animate();
</script>
</body>
</html>
