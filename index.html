<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2-3 Beat | Playable Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #ff00ff;
            --perfect-color: #ffeb3b;
            --bg-color: #0a0a12;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 500px; height: 100%; margin: 0 auto; background: #111; display: flex; flex-direction: column; }
        
        /* 頂部資訊 */
        #hud { padding: 15px; display: flex; justify-content: space-between; font-family: 'Orbitron'; z-index: 10; background: rgba(0,0,0,0.5); }
        
        /* 遊戲舞台 */
        #stage { flex-grow: 1; position: relative; width: 100%; background: linear-gradient(to bottom, #111, #222); overflow: hidden; }
        .lane { position: absolute; width: 50%; height: 100%; border-right: 1px solid rgba(255,255,255,0.05); }
        .lane-right { left: 50%; border-right: none; }
        
        /* 判定線 */
        #judge-line { position: absolute; bottom: 80px; width: 100%; height: 4px; background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); z-index: 5; }

        /* 音符 */
        .note { 
            position: absolute; 
            width: 80%; 
            left: 10%; 
            height: 20px; 
            background: var(--primary-color); 
            border-radius: 10px; 
            box-shadow: 0 0 10px var(--primary-color);
        }
        .note-right { background: var(--secondary-color); box-shadow: 0 0 10px var(--secondary-color); }

        /* 按鈕 */
        #controls { height: 120px; display: flex; gap: 5px; padding: 10px; }
        .hit-btn { flex: 1; border: 2px solid #444; background: #222; color: white; border-radius: 10px; font-family: 'Orbitron'; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.1s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .hit-btn:active { background: #444; transform: scale(0.98); }

        /* 判定反饋 */
        #feedback { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 2.5rem; pointer-events: none; opacity: 0; z-index: 20; }
        .anim-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { opacity:0; transform: translate(-50%,-50%) scale(0.5); } 50% { opacity:1; transform: translate(-50%,-50%) scale(1.1); } 100% { opacity:0; } }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-btn { padding: 15px 40px; font-family: 'Orbitron'; background: var(--primary-color); border: none; cursor: pointer; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="score">SCORE: 0</div>
        <div id="combo">COMBO: 0</div>
    </div>

    <div id="stage">
        <div class="lane lane-left"></div>
        <div class="lane lane-right"></div>
        <div id="judge-line"></div>
        <div id="feedback">PERFECT</div>
        <div id="notes-layer"></div>
    </div>

    <div id="controls">
        <div class="hit-btn" id="btn-0">LEFT</div>
        <div class="hit-btn" id="btn-1">RIGHT</div>
    </div>

    <div id="overlay">
        <h1 style="font-family:'Orbitron'; color:var(--primary-color)">2-3 BEAT</h1>
        <p>按下 [F] 或 [J] 鍵，或點擊下方按鈕</p>
        <button id="start-btn">START</button>
    </div>
</div>

<script>
/**
 * 遊戲引擎邏輯
 */
const CONFIG = {
    noteSpeed: 5,        // 音符下落速度 (像素/幀)
    spawnInterval: 800,  // 生成音符間隔 (毫秒)
    judgeY: window.innerHeight - 200, // 判定線位置
    tolerance: 50        // 判定容差 (像素)
};

let state = {
    score: 0,
    combo: 0,
    isPlaying: false,
    notes: [], // 儲存當前畫面上的音符
    lastSpawn: 0
};

const notesLayer = document.getElementById('notes-layer');
const feedbackEl = document.getElementById('feedback');

// 1. 遊戲主循環
function gameLoop(timestamp) {
    if (!state.isPlaying) return;

    // 自動生成音符 (2-3 拍邏輯模擬：隨機左右出現)
    if (timestamp - state.lastSpawn > CONFIG.spawnInterval) {
        spawnNote(Math.floor(Math.random() * 2));
        state.lastSpawn = timestamp;
    }

    // 更新音符位置
    state.notes.forEach((note, index) => {
        note.y += CONFIG.noteSpeed;
        note.el.style.transform = `translateY(${note.y}px)`;

        // 超過判定線未擊中 (Miss)
        if (note.y > window.innerHeight - 150) {
            note.el.remove();
            state.notes.splice(index, 1);
            showFeedback('MISS', '#ff4444');
            state.combo = 0;
            updateHUD();
        }
    });

    requestAnimationFrame(gameLoop);
}

// 2. 生成音符
function spawnNote(lane) {
    const noteEl = document.createElement('div');
    noteEl.className = `note ${lane === 1 ? 'note-right' : ''}`;
    // 設置左右位置
    noteEl.style.left = lane === 0 ? '10%' : '60%';
    noteEl.style.top = '0px';
    
    notesLayer.appendChild(noteEl);
    state.notes.push({
        el: noteEl,
        y: 0,
        lane: lane
    });
}

// 3. 處理擊打判定
function handleHit(lane) {
    if (!state.isPlaying) return;

    // 尋找該軌道中最接近判定線的音符
    const targetIndex = state.notes.findIndex(n => n.lane === lane && Math.abs(n.y - (window.innerHeight - 220)) < 100);

    if (targetIndex !== -1) {
        const note = state.notes[targetIndex];
        const dist = Math.abs(note.y - (window.innerHeight - 220));

        if (dist < 40) {
            showFeedback('PERFECT', '#ffeb3b');
            state.score += 100;
        } else {
            showFeedback('GOOD', '#00f2ff');
            state.score += 50;
        }

        state.combo++;
        note.el.remove();
        state.notes.splice(targetIndex, 1);
        updateHUD();
    }
}

function showFeedback(text, color) {
    feedbackEl.innerText = text;
    feedbackEl.style.color = color;
    feedbackEl.classList.remove('anim-pop');
    void feedbackEl.offsetWidth; 
    feedbackEl.classList.add('anim-pop');
}

function updateHUD() {
    document.getElementById('score').innerText = `SCORE: ${state.score}`;
    document.getElementById('combo').innerText = `COMBO: ${state.combo}`;
}

// 4. 事件綁定
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('overlay').style.display = 'none';
    state.isPlaying = true;
    state.lastSpawn = performance.now();
    requestAnimationFrame(gameLoop);
});

// 鍵盤支援
document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') handleHit(0);
    if (e.key === 'j' || e.key === 'J') handleHit(1);
});

// 點擊支援
document.getElementById('btn-0').addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(0); });
document.getElementById('btn-1').addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(1); });
document.getElementById('btn-0').addEventListener('mousedown', () => handleHit(0));
document.getElementById('btn-1').addEventListener('mousedown', () => handleHit(1));

</script>
</body>
</html>
