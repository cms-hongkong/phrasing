<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符分句大師 - 10題挑戰版</title>
    <style>
        :root {
            --sky-blue: #f0faff;
            --bar-line: #333;
            /* 定義漂亮的彩虹漸層 */
            --rainbow: linear-gradient(to right, #ff4081, #ffeb3b, #4caf50, #00bcd4, #9c27b0);
        }

        body {
            margin: 0;
            background-color: var(--sky-blue);
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #progress-bar {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #0277bd;
            font-weight: bold;
        }

        #task-info {
            background: white;
            padding: 20px 40px;
            margin: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border: 3px solid #b3e5fc;
            width: 80%;
            max-width: 600px;
        }

        .task-msg { font-size: 1.4rem; color: #0277bd; }
        .highlight { color: #e91e63; font-size: 2rem; font-weight: bold; }

        #music-line {
            display: flex;
            align-items: center;
            width: 95vw;
            max-width: 1000px;
            margin-top: 100px; /* 增加間距給弧形 */
            padding: 20px 0;
            position: relative;
        }

        .measure {
            flex: 1;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--bar-line);
            cursor: pointer;
        }

        .measure:first-child { border-left: 2px solid var(--bar-line); }
        .measure:last-child { border-right: 6px double var(--bar-line); }

        .notes {
            font-size: 45px;
            letter-spacing: 4px;
            color: #333;
        }

        /* --- 修改重點：弧形分句線 --- */
        .phrase-arc {
            position: absolute;
            top: -70px; /* 往上移動 */
            height: 80px;
            background: var(--rainbow);
            /* 建立橢圓弧形頂部 */
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            pointer-events: none;
            z-index: 10;
            /* 使用 mask 鏤空中間，只留下 6px 的邊框線條 */
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff 100%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff 100%);
        }

        .breath-bird {
            position: absolute;
            right: -18px;
            top: -35px;
            font-size: 30px;
            z-index: 15;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        #control-panel { margin-top: 60px; text-align: center; padding-bottom: 50px; }
        .btn {
            padding: 12px 40px;
            font-size: 1.6rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        #check-btn { background: #ffca28; color: #5d4037; box-shadow: 0 5px 0 #ffa000; }
        #next-btn { background: #8bc34a; color: white; display: none; box-shadow: 0 5px 0 #689f38; }
        #restart-btn { background: #03a9f4; color: white; display: none; box-shadow: 0 5px 0 #0288d1; }
        
        #feedback { margin-top: 20px; font-size: 1.5rem; font-weight: bold; min-height: 1.5em; }

        .congrats {
            font-size: 2.5rem !important;
            color: #ff4081 !important;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="progress-bar">進度：第 <span id="current-q">1</span> / 10 題</div>

<div id="task-info">
    <div class="task-msg">
        這是 <span id="beat-display" class="highlight">?</span> 拍子的歌<br>
        請每 <span id="rule-display" class="highlight">?</span> 小節畫一條「樂句弧線」🌈
    </div>
</div>

<div id="music-line"></div>

<div id="control-panel">
    <div id="feedback"></div>
    <button id="check-btn" class="btn" onclick="verify()">檢查分句</button>
    <button id="next-btn" class="btn" onclick="nextQuestion()">下一題</button>
    <button id="restart-btn" class="btn" onclick="resetGame()">重新開始新回合</button>
</div>

<script>
    const PATTERNS = {
        2: ['♩♩', '♫♩', '♩♫', '𝅗𝅥'],
        3: ['♩♩♩', '♫♩♩', '♩♫♩', '♩𝅗𝅥', '𝅗𝅥♩']
    };

    let currentBeat = 2;
    let currentRule = 2;
    let selectedPositions = new Set();
    let questionCount = 1;
    const totalQuestions = 10;

    function setupQuestion() {
        const line = document.getElementById('music-line');
        line.innerHTML = '';
        selectedPositions.clear();
        document.getElementById('feedback').innerText = '';
        document.getElementById('feedback').classList.remove('congrats');
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'inline-block';
        document.getElementById('current-q').innerText = questionCount;

        currentBeat = Math.random() > 0.5 ? 2 : 3;
        currentRule = Math.random() > 0.5 ? 2 : 4;

        document.getElementById('beat-display').innerText = currentBeat;
        document.getElementById('rule-display').innerText = currentRule;

        for (let i = 1; i <= 8; i++) {
            const m = document.createElement('div');
            m.className = 'measure';
            const notesText = PATTERNS[currentBeat][Math.floor(Math.random() * PATTERNS[currentBeat].length)];
            m.innerHTML = `<span class="notes">${notesText}</span>`;
            m.onclick = () => handlePhrase(i, m);
            line.appendChild(m);
        }
    }

    function handlePhrase(index, element) {
        if (selectedPositions.has(index)) {
            selectedPositions.delete(index);
            const arc = element.querySelector('.phrase-arc');
            const bird = element.querySelector('.breath-bird');
            if (arc) arc.remove();
            if (bird) bird.remove();
        } else {
            // 限制使用者只能在正確的倍數位置點擊，或自由點擊後由檢查判定
            selectedPositions.add(index);
            
            const arc = document.createElement('div');
            arc.className = 'phrase-arc';
            // 計算弧線寬度：跨越 N 小節
            arc.style.width = `calc(${currentRule * 100}% - 10px)`;
            arc.style.left = `calc(${(1 - currentRule) * 100}% + 5px)`; 
            element.appendChild(arc);

            const bird = document.createElement('div');
            bird.className = 'breath-bird';
            bird.innerText = '🐦';
            element.appendChild(bird);
        }
    }

    function verify() {
        let answers = [];
        for (let j = currentRule; j <= 8; j += currentRule) answers.push(j);

        const win = selectedPositions.size === answers.length && 
                    answers.every(a => selectedPositions.has(a));

        const fb = document.getElementById('feedback');
        if (win) {
            if (questionCount >= totalQuestions) {
                fb.innerText = "🎊 太棒了！你完成了 10 題挑戰！ 🎊";
                fb.classList.add('congrats');
                fb.style.color = "#ff4081";
                document.getElementById('check-btn').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'inline-block';
            } else {
                fb.innerText = "🌟 畫得太棒了！分句完全正確！";
                fb.style.color = "#2e7d32";
                document.getElementById('check-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'inline-block';
            }
        } else {
            fb.innerText = "❌ 弧線位置好像不對，再數數看？";
            fb.style.color = "#d32f2f";
        }
    }

    function nextQuestion() {
        questionCount++;
        setupQuestion();
    }

    function resetGame() {
        questionCount = 1;
        document.getElementById('restart-btn').style.display = 'none';
        setupQuestion();
    }

    setupQuestion();
</script>
</body>
</html>
