<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺分句練習器</title>
    <style>
        body {
            margin: 0;
            background: #f0f9ff;
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #ui-layer { margin-top: 20px; text-align: center; }
        
        /* 歌曲軌道 */
        #track-container {
            width: 90vw;
            height: 400px;
            background: white;
            border: 5px solid #bddbff;
            border-radius: 20px;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
        }

        /* 句子方塊 */
        .phrase-block {
            position: absolute;
            height: 60px;
            background: #e1f5fe;
            border: 2px dashed #03a9f4;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #01579b;
            font-weight: bold;
        }

        /* 掃描球 */
        #scanner-ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff5722;
            border-radius: 50%;
            top: 15px;
            left: 0;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255,87,34,0.5);
        }

        /* 判定區（分句點） */
        .goal-post {
            position: absolute;
            width: 20px;
            height: 100px;
            background: rgba(255, 235, 59, 0.3);
            border-left: 3px solid #fbc02d;
            z-index: 5;
        }

        /* 底部按鈕 */
        #btn-action {
            padding: 20px 80px;
            font-size: 2rem;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #2e7d32;
            cursor: pointer;
        }

        #btn-action:active { transform: translateY(4px); box-shadow: 0 4px 0 #2e7d32; }

        .success-arc {
            position: absolute;
            border: 5px solid #4caf50;
            border-bottom: none;
            border-radius: 50% 50% 0 0;
            animation: grow 0.5s ease-out;
        }

        @keyframes grow { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>👀 視覺分句練習 👀</h1>
    <p>小球跑到黃色線時，請準確按下「分句！」</p>
</div>

<div id="track-container" id="stage">
    <div id="scanner-ball"></div>
    </div>

<button id="btn-action">點擊開始</button>

<script>
    const stage = document.getElementById('track-container');
    const ball = document.getElementById('scanner-ball');
    const btn = document.getElementById('btn-action');

    const songPhrases = [
        { text: "小星星亮晶晶", x: 100, w: 200 },
        { text: "滿天都是小眼睛", x: 350, w: 200 },
        { text: "掛在天空放光明", x: 600, w: 200 }
    ];

    let isRunning = false;
    let posX = 0;
    let currentGoal = 0;

    // 初始化場景
    songPhrases.forEach((p, i) => {
        // 畫出句子方塊
        const block = document.createElement('div');
        block.className = 'phrase-block';
        block.style.left = p.x + 'px';
        block.style.top = '100px';
        block.style.width = p.w + 'px';
        block.innerText = p.text;
        stage.appendChild(block);

        // 畫出判定線（分句點就在方塊的末端）
        const post = document.createElement('div');
        post.className = 'goal-post';
        post.style.left = (p.x + p.w) + 'px';
        post.style.top = '80px';
        stage.appendChild(post);
    });

    btn.addEventListener('click', () => {
        if (!isRunning) {
            isRunning = true;
            btn.innerText = "分句！";
            animate();
        } else {
            checkHit();
        }
    });

    function animate() {
        if (!isRunning) return;
        posX += 2; // 移動速度
        ball.style.left = posX + 'px';
        ball.style.top = (100 + Math.sin(posX * 0.05) * 20) + 'px'; // 讓小球像在唱歌一樣跳動

        if (posX > 1000) {
            isRunning = false;
            btn.innerText = "重新挑戰";
            posX = 0;
        } else {
            requestAnimationFrame(animate);
        }
    }

    function checkHit() {
        const targetX = songPhrases[currentGoal].x + songPhrases[currentGoal].w;
        const dist = Math.abs(posX - targetX);

        if (dist < 30) {
            // 成功：畫出一道彩虹連接到下一句
            const arc = document.createElement('div');
            arc.className = 'success-arc';
            arc.style.left = targetX + 'px';
            arc.style.top = '100px';
            arc.style.width = '50px';
            arc.style.height = '30px';
            stage.appendChild(arc);
            
            currentGoal++;
            if(currentGoal >= songPhrases.length) currentGoal = 0;
        }
    }
</script>
</body>
</html>
