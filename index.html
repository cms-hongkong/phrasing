<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩虹分句畫家</title>
    <style>
        body {
            margin: 0;
            background: #e3f2fd; /* 天藍色背景，參考課本 */
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #task-area {
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            margin: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #ffca28;
            text-align: center;
        }

        .task-title { font-size: 1.5rem; color: #1565c0; }
        .target { font-size: 2rem; color: #e91e63; font-weight: bold; }

        /* 樂譜區 */
        #stave-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 90vw;
            max-width: 900px;
            margin-top: 60px;
            gap: 0;
            position: relative;
        }

        .bar {
            height: 120px;
            background: white;
            border-right: 2px solid #333;
            border-bottom: 2px solid #333;
            border-top: 2px solid #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
            cursor: pointer;
        }
        
        /* 繪製五線譜線條 */
        .bar::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 100% 20px;
            top: 0; left: 0;
        }

        .bar:first-child { border-left: 4px solid #333; }
        .bar:nth-child(4) { border-right: 4px solid #333; }
        .bar:nth-child(5) { border-left: 4px solid #333; margin-top: 40px; }
        .bar:nth-child(8) { border-right: 4px solid #333; margin-top: 40px; }

        .bar-num { position: absolute; top: -25px; left: 5px; color: #777; font-size: 14px; }

        /* 彩虹弧線 (教科書風格) */
        .rainbow-arc {
            position: absolute;
            top: -60px;
            height: 80px;
            border: 6px solid;
            border-image: linear-gradient(to right, red, orange, yellow, green, cyan, blue, purple) 1;
            border-bottom: none;
            border-radius: 100px 100px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        /* 小鳥提示 (換氣位) */
        .bird-hint {
            position: absolute;
            right: -20px;
            top: -40px;
            font-size: 30px;
            z-index: 15;
        }

        /* 音符 */
        .note { font-size: 40px; color: #333; z-index: 5; }

        /* 按鈕區 */
        #control-panel { margin-top: 50px; }
        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 #999;
        }
        #check-btn { background: #ffca28; color: #5d4037; }
        #next-btn { background: #4caf50; color: white; display: none; }
        
        #result { margin-top: 20px; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="task-area">
    <div class="task-title">
        這首曲子是 <span id="beat-info" class="target">?</span> 拍子<br>
        請每 <span id="phrase-info" class="target">?</span> 小節畫一條「分句線」🌈
    </div>
</div>

<div id="stave-container"></div>

<div id="control-panel">
    <div id="result"></div>
    <button id="check-btn" class="btn" onclick="validate()">我畫好分句了！</button>
    <button id="next-btn" class="btn" onclick="init()">下一題</button>
</div>

<script>
    let beatType = 2;
    let phraseRule = 2;
    let selectedBars = new Set();

    function init() {
        const container = document.getElementById('stave-container');
        container.innerHTML = '';
        selectedBars.clear();
        document.getElementById('result').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';

        // 題目設置
        beatType = Math.random() > 0.5 ? 2 : 3;
        phraseRule = Math.random() > 0.5 ? 2 : 4;
        document.getElementById('beat-info').innerText = beatType;
        document.getElementById('phrase-info').innerText = phraseRule;

        for (let i = 1; i <= 8; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.innerHTML = `<span class="bar-num">${i}</span>`;
            
            // 加入音符 (教科書風格的實心音符)
            for(let j=0; j<beatType; j++) {
                const n = document.createElement('span');
                n.className = 'note';
                n.innerText = '♩';
                bar.appendChild(n);
            }

            bar.onclick = () => toggleArc(i, bar);
            container.appendChild(bar);
        }
    }

    function toggleArc(num, el) {
        if (selectedBars.has(num)) {
            selectedBars.delete(num);
            const oldArc = el.querySelector('.rainbow-arc');
            const oldBird = el.querySelector('.bird-hint');
            if (oldArc) oldArc.remove();
            if (oldBird) oldBird.remove();
        } else {
            selectedBars.add(num);
            // 創建彩虹弧線
            const arc = document.createElement('div');
            arc.className = 'rainbow-arc';
            // 寬度計算：根據分句規則跨越小節
            arc.style.width = `calc(${100 * phraseRule}% - 10px)`;
            arc.style.right = '0';
            el.appendChild(arc);

            // 創建換氣小鳥 (參考課本第13及15頁)
            const bird = document.createElement('div');
            bird.className = 'bird-hint';
            bird.innerText = '🐦';
            el.appendChild(bird);
        }
    }

    function validate() {
        let corrects = [];
        for (let i = phraseRule; i <= 8; i += phraseRule) corrects.push(i);

        const isWin = selectedBars.size === corrects.length && 
                      corrects.every(v => selectedBars.has(v));

        const res = document.getElementById('result');
        if (isWin) {
            res.innerText = "🌟 畫得太棒了！就像課本一樣準確！";
            res.style.color = "#2e7d32";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            res.innerText = "❌ 弧線的位置好像不太對，再數數看？";
            res.style.color = "#d32f2f";
        }
    }

    init();
</script>
</body>
</html>
