<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2-3 Beat | Rhythm Revolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #7000ff;
            --perfect-color: #ffeb3b;
            --bg-color: #0a0a12;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* 遊戲容器 */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            margin: 0 auto;
            background: linear-gradient(180deg, rgba(10,10,18,1) 0%, rgba(20,20,40,1) 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* 頂部資訊欄 */
        #hud {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #score-board {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
        }

        /* 判定區域 */
        #play-area {
            flex-grow: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        /* 判定線 */
        #judge-line {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 4px;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            z-index: 5;
        }

        /* 擊打按鈕 (支援 2-3 拍邏輯) */
        #controls {
            height: 150px;
            display: flex;
            gap: 10px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .hit-btn {
            flex: 1;
            border: 2px solid var(--primary-color);
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary-color);
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .hit-btn:active {
            background: var(--primary-color);
            color: var(--bg-color);
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--primary-color);
        }

        /* 判定文字特效 */
        #feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
        }

        .perfect-anim { animation: feedbackPop 0.4s ease-out; color: var(--perfect-color); }
        @keyframes feedbackPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 開始界面 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 18, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            cursor: pointer;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-color);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="score-board">SCORE: 000000</div>
        <div id="combo-display" style="color: var(--secondary-color);">COMBO: 0</div>
    </div>

    <div id="play-area">
        <div id="feedback">PERFECT</div>
        <div id="judge-line"></div>
        </div>

    <div id="controls">
        <div class="hit-btn" id="btn-left">2-BEAT</div>
        <div class="hit-btn" id="btn-right">3-BEAT</div>
    </div>

    <div id="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--primary-color);">2-3 BEAT</h1>
        <p>跟隨拉丁節奏，挑戰你的反應極限</p>
        <button id="start-btn">START GAME</button>
    </div>
</div>

<script>
    // 基礎遊戲引擎架構
    const state = {
        score: 0,
        combo: 0,
        isPlaying: false
    };

    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score-board');
    const overlay = document.getElementById('overlay');

    // 處理擊打動作
    function handleHit(type) {
        if (!state.isPlaying) return;

        // 這裡應加入判定邏輯 (檢查音符位置)
        // 暫時演示視覺效果
        showFeedback('PERFECT');
        updateScore(100);
    }

    function showFeedback(text) {
        feedbackEl.innerText = text;
        feedbackEl.classList.remove('perfect-anim');
        void feedbackEl.offsetWidth; // 強制重繪觸發動畫
        feedbackEl.classList.add('perfect-anim');
    }

    function updateScore(points) {
        state.score += points;
        state.combo += 1;
        scoreEl.innerText = `SCORE: ${state.score.toString().padStart(6, '0')}`;
        document.getElementById('combo-display').innerText = `COMBO: ${state.combo}`;
    }

    // 事件監聽
    document.getElementById('start-btn').addEventListener('click', () => {
        overlay.style.display = 'none';
        state.isPlaying = true;
        // 這裡開始播放音樂與生成音符
        console.log("Game Started");
    });

    // 支援鍵盤操作 (F & J 鍵)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') handleHit('left');
        if (e.key === 'j' || e.key === 'J') handleHit('right');
    });

    // 支援觸摸操作
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); handleHit('left'); });
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); handleHit('right'); });

</script>
</body>
</html>
