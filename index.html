<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2-3 Beat | Visual Trainer</title>
    <style>
        :root {
            --bg: #05050a;
            --lane2: #00d2ff;
            --lane3: #ff007b;
            --grid-opacity: 0.15;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* 遊戲主舞台 */
        #stage {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* 軌道通用樣式 */
        .lane {
            flex: 1;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* 2 拍背景網格：每 50% 一條線 */
        #lane-2 {
            background-image: linear-gradient(rgba(0,210,255, var(--grid-opacity)) 2px, transparent 2px);
            background-size: 100% 50%; /* 視覺上分成兩份 */
        }

        /* 3 拍背景網格：每 33.3% 一條線 */
        #lane-3 {
            background-image: linear-gradient(rgba(255,0,123, var(--grid-opacity)) 2px, transparent 2px);
            background-size: 100% 33.33%; /* 視覺上分成三份 */
        }

        /* 判定線 */
        .judge-line {
            position: absolute;
            bottom: 80px;
            width: 100%;
            height: 4px;
            background: white;
            box-shadow: 0 0 15px white;
            z-index: 10;
        }

        /* 音符樣式 */
        .note {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 15px;
            border-radius: 4px;
            transition: transform 0.016s linear;
        }
        .note-2 { background: var(--lane2); box-shadow: 0 0 10px var(--lane2); }
        .note-3 { background: var(--lane3); box-shadow: 0 0 10px var(--lane3); }

        /* 標籤 */
        .lane-label {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            z-index: 5;
        }

        /* 控制區域 */
        #controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            display: flex;
            background: rgba(0,0,0,0.8);
            z-index: 20;
        }
        .hit-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>

<div id="stage">
    <div class="lane" id="lane-2">
        <div class="lane-label" style="color: var(--lane2)">BINARY (1 - 2)</div>
        <div class="judge-line"></div>
        <div id="notes-2"></div>
    </div>

    <div class="lane" id="lane-3">
        <div class="lane-label" style="color: var(--lane3)">TERNARY (1 - 2 - 3)</div>
        <div class="judge-line"></div>
        <div id="notes-3"></div>
    </div>

    <div id="controls">
        <div class="hit-zone">按 [F] 鍵</div>
        <div class="hit-zone">按 [J] 鍵</div>
    </div>
</div>

<script>
    const CONFIG = {
        speed: 4,        // 像素/幀
        loopHeight: 600, // 一個完整小節的高度
    };

    let state = {
        notes: [],
        frame: 0
    };

    function spawnNotes() {
        const notes2 = document.getElementById('notes-2');
        const notes3 = document.getElementById('notes-3');

        // 每 600 像素為一個大循環（1小節）
        // 生成 2 拍音符：位於 0% 和 50% 的位置
        [0, 300].forEach(y => {
            createNote(notes2, y, 'note-2');
        });

        // 生成 3 拍音符：位於 0%, 200%, 400% 的位置
        [0, 200, 400].forEach(y => {
            createNote(notes3, y, 'note-3');
        });
    }

    function createNote(parent, y, className) {
        const el = document.createElement('div');
        el.className = `note ${className}`;
        parent.appendChild(el);
        state.notes.push({
            el: el,
            y: -y, // 從上方負值開始
            active: true
        });
    }

    function update() {
        state.notes.forEach((note, index) => {
            note.y += CONFIG.speed;
            note.el.style.transform = `translateY(${note.y}px)`;

            // 循環邏輯：如果音符跑出底端，重新回到頂端（形成無窮盡的練習流）
            if (note.y > window.innerHeight) {
                note.y = -CONFIG.loopHeight + (note.y - window.innerHeight);
            }
        });

        requestAnimationFrame(update);
    }

    // 初始化
    spawnNotes();
    update();

</script>
</body>
</html>
